AWSTemplateFormatVersion: '2010-09-09'
Description: 'AWS billing notification system for Discord'

Parameters:
  DiscordWebhookParameterName:
    Type: String
    Default: "/billing-notification/discord-webhook-url"
    Description: Parameter Store parameter name for Discord webhook URL

  NotificationTime:
    Type: String
    Default: "cron(0 9 * * ? *)"
    Description: Schedule for notifications (default 9 AM JST daily)

  ScheduleTimeZone:
    Type: String
    Default: "Asia/Tokyo"
    Description: IANA timezone for the schedule

Resources:
  # IAM Role for Lambda function
  BillingNotificationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: BillingNotificationLambdaRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BillingReadPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ce:GetDimensionValues
                  - ce:GetReservationCoverage
                  - ce:GetReservationPurchaseRecommendation
                  - ce:GetReservationUtilization
                  - ce:GetUsageAndCosts
                  - ce:ListCostCategoryDefinitions
                  - ce:GetRightsizingRecommendation
                  - ce:GetCostAndUsage
                  - budgets:ViewBudget
                Resource: '*'
        - PolicyName: ParameterStoreReadPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${DiscordWebhookParameterName}'

  # Lambda function for billing notification
  BillingNotificationFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: aws-billing-discord-notification
      Runtime: python3.11
      Handler: index.lambda_handler
      Role: !GetAtt BillingNotificationRole.Arn
      Timeout: 30
      Architectures:
        - arm64
      Environment:
        Variables:
          DISCORD_WEBHOOK_PARAMETER_NAME: !Ref DiscordWebhookParameterName
      Code:
        ZipFile: |
          import json
          import urllib3
          import boto3
          import os
          from datetime import datetime, timedelta
          from decimal import Decimal

          def lambda_handler(event, context):
              # Get Discord webhook URL from Parameter Store
              ssm = boto3.client('ssm')
              parameter_name = os.environ['DISCORD_WEBHOOK_PARAMETER_NAME']

              try:
                  webhook_response = ssm.get_parameter(
                      Name=parameter_name,
                      WithDecryption=True
                  )
                  webhook_url = webhook_response['Parameter']['Value']
              except Exception as e:
                  print(f"Failed to get webhook URL from Parameter Store: {str(e)}")
                  return {
                      'statusCode': 500,
                      'body': json.dumps({'error': f'Parameter Store error: {str(e)}'})
                  }

              # Cost Explorer client
              ce = boto3.client('ce', region_name='us-east-1')

              # Get current date and yesterday
              today = datetime.now().date()
              yesterday = today - timedelta(days=1)
              day_before_yesterday = today - timedelta(days=2)

              try:
                  # Get yesterday's cost
                  response = ce.get_cost_and_usage(
                      TimePeriod={
                          'Start': str(yesterday),
                          'End': str(today)
                      },
                      Granularity='DAILY',
                      Metrics=['BlendedCost']
                  )

                  yesterday_cost = Decimal('0')
                  if response['ResultsByTime']:
                      yesterday_cost = Decimal(response['ResultsByTime'][0]['Total']['BlendedCost']['Amount'])

                  # Get day before yesterday's cost for comparison
                  response_prev = ce.get_cost_and_usage(
                      TimePeriod={
                          'Start': str(day_before_yesterday),
                          'End': str(yesterday)
                      },
                      Granularity='DAILY',
                      Metrics=['BlendedCost']
                  )

                  prev_cost = Decimal('0')
                  if response_prev['ResultsByTime']:
                      prev_cost = Decimal(response_prev['ResultsByTime'][0]['Total']['BlendedCost']['Amount'])

                  # Get monthly cost so far
                  # On the 1st of the month, fall back to the previous month's total
                  # because Cost Explorer requires Start < End.
                  month_start = today.replace(day=1)
                  if month_start == today:
                      prev_month_end = month_start
                      prev_month_start = (month_start - timedelta(days=1)).replace(day=1)
                      monthly_period_start = prev_month_start
                      monthly_period_end = prev_month_end
                  else:
                      monthly_period_start = month_start
                      monthly_period_end = today

                  response_monthly = ce.get_cost_and_usage(
                      TimePeriod={
                          'Start': str(monthly_period_start),
                          'End': str(monthly_period_end)
                      },
                      Granularity='MONTHLY',
                      Metrics=['BlendedCost']
                  )

                  monthly_cost = Decimal('0')
                  if response_monthly['ResultsByTime']:
                      monthly_cost = Decimal(response_monthly['ResultsByTime'][0]['Total']['BlendedCost']['Amount'])

                  # Calculate change
                  cost_change = yesterday_cost - prev_cost
                  change_symbol = "📈" if cost_change > 0 else "📉" if cost_change < 0 else "➡️"

                  # Prepare Discord message
                  embed = {
                      "title": "🏦 AWS 利用料金 日次レポート",
                      "color": 0xFF9900,
                      "timestamp": datetime.utcnow().isoformat(),
                      "fields": [
                          {
                              "name": f"📅 {yesterday.strftime('%Y年%m月%d日')} の利用料金",
                              "value": f"**${float(yesterday_cost):.2f}**",
                              "inline": True
                          },
                          {
                              "name": f"{change_symbol} 前日比",
                              "value": f"${float(cost_change):+.2f}",
                              "inline": True
                          },
                          {
                              "name": (
                                  f"📊 {monthly_period_start.strftime('%Y年%m月')} 累計"
                                  if month_start == today
                                  else f"📊 今月の累計 ({month_start.strftime('%m月%d日')}〜)"
                              ),
                              "value": f"**${float(monthly_cost):.2f}**",
                              "inline": False
                          }
                      ],
                      "footer": {
                          "text": "AWS Cost Explorer | 費用は概算値です"
                      }
                  }

                  # Add warning if cost is high
                  if yesterday_cost > Decimal('50'):
                      embed["color"] = 0xFF0000
                      embed["fields"].insert(0, {
                          "name": "⚠️ 高額利用アラート",
                          "value": "昨日の利用料金が$50を超えています",
                          "inline": False
                      })

                  message = {
                      "embeds": [embed]
                  }

                  # Send to Discord
                  http = urllib3.PoolManager()

                  response = http.request(
                      'POST',
                      webhook_url,
                      body=json.dumps(message),
                      headers={'Content-Type': 'application/json'}
                  )

                  return {
                      'statusCode': 200,
                      'body': json.dumps({
                          'message': 'Notification sent successfully',
                          'yesterday_cost': float(yesterday_cost),
                          'monthly_cost': float(monthly_cost)
                      })
                  }

              except Exception as e:
                  print(f"Error: {str(e)}")

                  # Send error notification to Discord
                  error_message = {
                      "embeds": [{
                          "title": "❌ AWS請求額通知エラー",
                          "description": f"エラーが発生しました: {str(e)}",
                          "color": 0xFF0000,
                          "timestamp": datetime.utcnow().isoformat()
                      }]
                  }

                  try:
                      http = urllib3.PoolManager()
                      http.request(
                          'POST',
                          webhook_url,
                          body=json.dumps(error_message),
                          headers={'Content-Type': 'application/json'}
                      )
                  except:
                      pass

                  return {
                      'statusCode': 500,
                      'body': json.dumps({'error': str(e)})
                  }

  # IAM Role for EventBridge Scheduler to invoke Lambda
  BillingNotificationSchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: BillingNotificationSchedulerRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      Policies:
        - PolicyName: InvokeLambdaPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource:
                  - !GetAtt BillingNotificationFunction.Arn
                  - !Sub '${BillingNotificationFunction.Arn}:*'

  # EventBridge Scheduler for daily scheduling
  BillingNotificationDailySchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: aws-billing-discord-schedule
      Description: Daily schedule for AWS billing notifications
      ScheduleExpression: !Ref NotificationTime
      ScheduleExpressionTimezone: !Ref ScheduleTimeZone
      State: ENABLED
      FlexibleTimeWindow:
        Mode: 'OFF'
      Target:
        Arn: !GetAtt BillingNotificationFunction.Arn
        RoleArn: !GetAtt BillingNotificationSchedulerRole.Arn

  # Test schedule for immediate execution (optional)
  BillingNotificationTestSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: aws-billing-discord-test
      Description: Test schedule for immediate execution
      ScheduleExpression: "rate(1 minute)"
      ScheduleExpressionTimezone: !Ref ScheduleTimeZone
      State: DISABLED
      FlexibleTimeWindow:
        Mode: 'OFF'
      Target:
        Arn: !GetAtt BillingNotificationFunction.Arn
        RoleArn: !GetAtt BillingNotificationSchedulerRole.Arn

Outputs:
  LambdaFunctionArn:
    Description: ARN of the billing notification Lambda function
    Value: !GetAtt BillingNotificationFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-LambdaFunctionArn"

  ScheduleArn:
    Description: ARN of the EventBridge Scheduler schedule
    Value: !GetAtt BillingNotificationDailySchedule.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ScheduleArn"
